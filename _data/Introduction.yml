    - description: >
        ISTQB-certified QA professional specialized in manual functional testing, Android app QA, and quality analysis in Agile environments. Experienced in regression testing, defect tracking, API testing with Postman and Hoppscotch, and accessibility testing using Silktide and WAVE.
        Skilled with JIRA and Outsystems Service Center, with some hands-on experience in test automation using Katalon Studio and OTI for Outsystems. Strong focus on delivering reliable, user-friendly, and high-quality software products through collaboration and attention to detail.
